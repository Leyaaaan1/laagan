# Database Configuration
spring.datasource.url=${POSTGRES_DB_URL}
spring.datasource.username=${POSTGRES_DB_USERNAME}
spring.datasource.password=${POSTGRES_DB_PASSWORD}

# JPA settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Enable PostGIS support
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION}

server.address=0.0.0.0
server.port=8080

cloudinary.cloud_name=${cloudinary_cloud_name}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

MAPBOX_TOKEN=${REACT_APP_MAPBOX_TOKEN}
ORS_API_KEY=${ORS_TOKEN}

WIKIMEDIA_API_BASE=${WIKIMEDIA_API_BASE}
NOMINATIM_API_BASE=${NOMINATIM_API_BASE}

USER_AGENT=${AGENT}
ORS_REFERER=${ORS_REFERER}

GRASS_HOPPER=${GRASS_HOPPER_KEY}

fb_app_id=${FB_APP_ID}
fb_app_secret=${FB_APP_SECRET}
fb_token=${FB_TOKEN}
mapbox.static-map.url-template=${MAPBOX_STATIC_MAP_URL_TEMPLATE}

baseurl=${tokenBaseUrl}

# Flyway Configuration
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false
spring.flyway.schemas=public
spring.flyway.default-schema=public

resilience4j.ratelimiter.configs.default.register-health-indicator=true
resilience4j.ratelimiter.configs.default.event-consumer-buffer-size=100

# GraphHopper: 2,500 requests/day = ~1.7 req/sec ? 2 req/sec safe
resilience4j.ratelimiter.instances.graphhopper.timeout-duration=5s
resilience4j.ratelimiter.instances.graphhopper.limit-refresh-period=1s
resilience4j.ratelimiter.instances.graphhopper.limit-for-period=2

# Nominatim: 1 request/second (STRICT)
resilience4j.ratelimiter.instances.nominatim.timeout-duration=5s
resilience4j.ratelimiter.instances.nominatim.limit-refresh-period=1s
resilience4j.ratelimiter.instances.nominatim.limit-for-period=1

# Wikimedia: Less strict (already cached)
resilience4j.ratelimiter.instances.wikimedia.timeout-duration=5s
resilience4j.ratelimiter.instances.wikimedia.limit-refresh-period=1s
resilience4j.ratelimiter.instances.wikimedia.limit-for-period=3

# Mapbox: Conservative (600/month = ~0.8 req/day)
resilience4j.ratelimiter.instances.mapbox.timeout-duration=5s
resilience4j.ratelimiter.instances.mapbox.limit-refresh-period=60s
resilience4j.ratelimiter.instances.mapbox.limit-for-period=1


# =========================================================================
# Redis Configuration (Development - Local Docker)
# =========================================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.connect-timeout=2000ms
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=5
spring.data.redis.lettuce.shutdown-timeout=100ms


spring.cache.type=simple
spring.cache.cache-names=locationImages,routes,landmarks

