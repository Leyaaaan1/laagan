# Database Configuration
spring.datasource.url=${POSTGRES_DB_URL}
spring.datasource.username=${POSTGRES_DB_USERNAME}
spring.datasource.password=${POSTGRES_DB_PASSWORD}

# Hikari Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.leak-detection-threshold=0

# JPA settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# OAuth2
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_APP_SECRET}
spring.security.oauth2.client.registration.facebook.scope=email,public_profile
spring.security.oauth2.client.registration.facebook.redirect-uri=${FACEBOOK_REDIRECT_URI}

GOOGLE_CLIENT_ID=${google_client_id}

# Enable PostGIS support
spring.jpa.database-platform=org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION}

server.address=0.0.0.0
server.port=8080

# Cloudinary
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

# External APIs
ORS_API_KEY=${ORS_TOKEN}
WIKIMEDIA_API_BASE=${WIKIMEDIA_API_BASE}
NOMINATIM_API_BASE=${NOMINATIM_API_BASE}
USER_AGENT=${AGENT}
ORS_REFERER=${ORS_REFERER}
GRASS_HOPPER=${GRASS_HOPPER_KEY}

# Mapbox
mapbox.token=${mb_token}
mapbox.static-map-url=${MAPBOX_STATIC_MAP_URL}

baseurl=${tokenBaseUrl}

# Flyway Configuration
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=false
spring.flyway.out-of-order=false
spring.flyway.schemas=public
spring.flyway.default-schema=public

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=5000ms
spring.data.redis.connect-timeout=2000ms
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.shutdown-timeout=100ms
spring.data.redis.ssl.enabled=${REDIS_SSL:false}
spring.data.redis.lettuce.pool.time-between-eviction-runs=30s
spring.data.redis.lettuce.pool.min-evictable-idle-time=60s
spring.data.redis.lettuce.cluster.refresh.adaptive=true
spring.data.redis.lettuce.cluster.refresh.period=60s
management.health.redis.enabled=false
spring.data.redis.repositories.enabled=false

# Spring Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.cache-names=locationImages,routes,landmarks
spring.cache.redis.key-prefix=ridershub:cache:

token.blacklist.redis-key=ridershub:blacklist:

# Resilience4j Rate Limiting
resilience4j.ratelimiter.configs.default.register-health-indicator=true
resilience4j.ratelimiter.configs.default.event-consumer-buffer-size=100

resilience4j.ratelimiter.instances.graphhopper.timeout-duration=5s
resilience4j.ratelimiter.instances.graphhopper.limit-refresh-period=1s
resilience4j.ratelimiter.instances.graphhopper.limit-for-period=2

resilience4j.ratelimiter.instances.nominatim.timeout-duration=5s
resilience4j.ratelimiter.instances.nominatim.limit-refresh-period=1s
resilience4j.ratelimiter.instances.nominatim.limit-for-period=1

resilience4j.ratelimiter.instances.wikimedia.timeout-duration=5s
resilience4j.ratelimiter.instances.wikimedia.limit-refresh-period=1s
resilience4j.ratelimiter.instances.wikimedia.limit-for-period=5

resilience4j.ratelimiter.instances.mapbox.timeout-duration=5s
resilience4j.ratelimiter.instances.mapbox.limit-refresh-period=60s
resilience4j.ratelimiter.instances.mapbox.limit-for-period=1

# Account Lockout Settings
security.lockout.max-failed-attempts=5
security.lockout.lockout-duration-minutes=15

resilience4j.ratelimiter.instances.login.timeout-duration=5s
resilience4j.ratelimiter.instances.login.limit-refresh-period=1m
resilience4j.ratelimiter.instances.login.limit-for-period=5

resilience4j.ratelimiter.instances.register.timeout-duration=5s
resilience4j.ratelimiter.instances.register.limit-refresh-period=10m
resilience4j.ratelimiter.instances.register.limit-for-period=3

# Logging — console only (Render is ephemeral, no point writing to disk)
logging.level.root=INFO
logging.level.leyans.RidersHub=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

server.error.include-stacktrace=never
server.error.include-message=never

server.tomcat.max-http-post-size=10485760
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-header-size=32KB
server.tomcat.max-parameters=1024

app.registration.max-users=50

email.verification.token-expiry-minutes=30
email.verification.sender-name=Laagan
email.verification.from-email=${MAIL_USERNAME}
resend.api-key=${RESEND_API_KEY}
# Frontend URL for verification link
email.verification.frontend-url=${VERIFICATION_FRONTEND_URL}

spring.main.lazy-initialization=true