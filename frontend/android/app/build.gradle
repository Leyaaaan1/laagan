apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

// ── Load .env file ──
def envFile = rootProject.file("../.env")
def envVars = [:]
if (envFile.exists()) {
    envFile.eachLine { line ->
        def matcher = line =~ /^\s*([^#=]+?)\s*=\s*(.*)\s*$/
        if (matcher) {
            envVars[matcher[0][1]] = matcher[0][2]
        }
    }
}

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    autolinkLibrariesWithApp()
}

def enableProguardInReleaseBuilds = false

def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {

    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.laagan"
    defaultConfig {
        applicationId "com.laagan"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 16
        versionName "1.0.16"

        // ── Inject Facebook credentials from .env ──
        resValue "string", "facebook_app_id", envVars["FACEBOOK_APP_ID"] ?: ""
        resValue "string", "facebook_client_token", envVars["FACEBOOK_CLIENT_TOKEN"] ?: ""
        resValue "string", "fb_login_protocol_scheme", "fb" + (envVars["FACEBOOK_APP_ID"] ?: "")
    }
    signingConfigs {
        debug {
            storeFile file('debug_new.keystore')
            storePassword 'android'
            keyAlias 'newkey'
            keyPassword 'android'
        }
        release {
            storeFile file('laagan-release.keystore')
            storePassword project.findProperty("LAAGAN_STORE_PASSWORD") ?: ""
            keyAlias 'laagan'
            keyPassword project.findProperty("LAAGAN_KEY_PASSWORD") ?: ""
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release  // ← fixed
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation 'com.google.mlkit:barcode-scanning:17.2.0'
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.8.0"
    implementation 'com.facebook.android:facebook-login:16.3.0'
    implementation 'com.google.android.gms:play-services-auth:20.7.0'

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}